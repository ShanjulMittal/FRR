      .small{font:500 12px -apple-system,BlinkMacSystemFont,Segoe UI,Inter,Roboto,Arial,sans-serif;fill:#9fb3df}
      .pill{font:700 11px -apple-system,BlinkMacSystemFont,Segoe UI,Inter,Roboto,Arial,sans-serif;fill:#0b1220}
      .mono{font:600 12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#cfe0ff}
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="56" fill="#0f172a" opacity="0.95"/>
