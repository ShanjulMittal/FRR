! Complex Firewall Configuration for Edge Case Testing
! This file contains various elements to test regex parsing
!
hostname edge-case-firewall

! Object group definitions
object-group network INTERNAL_NETWORKS
 network-object 192.168.1.0 255.255.255.0
 network-object 192.168.2.0 255.255.255.0
 network-object host 10.0.0.1

!
object-group network DMZ_SERVERS
 network-object host 172.16.1.10
 network-object host 172.16.1.11
 network-object host 172.16.1.12
!

object-group service WEB_PORTS tcp
 service-object tcp eq 80
 service-object tcp eq 443
 service-object tcp eq 8080

!
! Access Control Lists with mixed rule types
access-list OUTSIDE_IN line 1 extended permit tcp object-group INTERNAL_NETWORKS object-group DMZ_SERVERS object-group WEB_PORTS

! Plain IP rules
access-list OUTSIDE_IN line 2 extended permit tcp host 192.168.1.100 host 172.16.1.20 eq 22
access-list OUTSIDE_IN line 3 extended deny tcp any host 172.16.1.30 eq 23

! More object group rules
access-list OUTSIDE_IN line 4 extended permit udp object-group INTERNAL_NETWORKS any eq 53

! Comment in the middle of rules
! This is a comment that should be ignored
access-list OUTSIDE_IN line 5 extended permit icmp any any

! Blank lines and more comments follow


! Another comment after blank lines
access-list INSIDE_OUT line 1 extended permit tcp host 10.0.0.5 object-group DMZ_SERVERS eq 3306

! Mixed rules with both object groups and plain IPs
access-list INSIDE_OUT line 2 extended deny tcp object-group INTERNAL_NETWORKS host 8.8.8.8 eq 80

! Final rule with plain IPs
access-list INSIDE_OUT line 3 extended permit ip 192.168.0.0 255.255.0.0 10.0.0.0 255.0.0.0

!
! End of configuration with final comment